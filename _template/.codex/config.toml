# Codex CLI Project-Scoped Configuration
# MCP Server configurations for this project
# Reserved input adapters live in `.codex/commands/`.
# Shared procedure bodies remain in `AGENTS.md` and `docs/protocols/`.
#
# Note:
# Codex project config does not use Claude-style `Read(...)` allowlist entries.
# External path access is governed by Codex trust/sandbox behavior rather than
# per-path read permissions in this file.

[mcp_servers.MCP_DOCKER]
command = "docker"
args = ["mcp", "gateway", "run"]

[mcp_servers.chrome-devtools]
command = "/bin/zsh"
args = [
  "-lc",
  "source ~/.nvm/nvm.sh >/dev/null 2>&1 || true; nvm use 24 >/dev/null 2>&1 || true; npx -y chrome-devtools-mcp@latest"
]

[mcp_servers.notebooklm-mcp]
command = "/opt/homebrew/bin/uvx"
args = ["--python", ">=3.12", "--from", "notebooklm-mcp-cli", "--with", "fakeredis<2.35", "notebooklm-mcp"]

[mcp_servers.mcp-obsidian]
command = "/bin/zsh"
args = [
  "-lc",
  'source ~/.nvm/nvm.sh >/dev/null 2>&1 || true; nvm use 24 >/dev/null 2>&1 || true; npx -y @mauricio.wolff/mcp-obsidian@latest "/path/to/your/local/repo"'
]

[mcp_servers.claude_code]
command = "claude"
args = ["mcp", "serve"]

[mcp_servers.gemini-cli]
command = "/bin/zsh"
args = [
  "-lc",
  "source ~/.nvm/nvm.sh >/dev/null 2>&1 || true; nvm use 24 >/dev/null 2>&1 || true; npx -y mcp-gemini-cli --allow-npx"
]

[mcp_servers.codex-tool]
command = "/bin/zsh"
args = [
  "-lc",
  "source ~/.nvm/nvm.sh >/dev/null 2>&1 || true; nvm use 24 >/dev/null 2>&1 || true; codex mcp-server"
]

[mcp_servers.rag-memory]
command = "/bin/zsh"
args = [
  "-lc",
  "source ~/.nvm/nvm.sh >/dev/null 2>&1 || true; nvm use 24 >/dev/null 2>&1 || true; npx -y rag-memory-epf-mcp@latest"
]
env.DB_FILE_PATH = "{{PROJECT_ROOT}}/.memory/rag-memory.db"
alwaysAllow = [
  "createEntities",
  "createRelations",
  "addObservations",
  "deleteEntities",
  "deleteObservations",
  "deleteRelations",
  "updateRelations",
  "readGraph",
  "searchNodes",
  "openNodes",
  "getNeighbors",
  "getKnowledgeGraphStats",
  "exportGraph",
  "importGraph",
  "hybridSearch",
  "getDetailedContext",
  "embedAllEntities",
  "storeDocument",
  "chunkDocument",
  "embedChunks",
  "extractTerms",
  "deleteDocuments",
  "listDocuments",
  "linkEntitiesToDocument",
  "getGraphMetrics",
  "detectCommunities",
  "analyzeGraphStructure",
  "getMigrationStatus",
  "runMigrations",
  "rollbackMigration"
]

[projects."/path/to/your/projects"]
trust_level = "trusted"
